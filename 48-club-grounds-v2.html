<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>48 Klúbburinn — Grounds + Match Picker</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&family=Crimson+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f1eb;
  --bg-warm: #eee9e0;
  --surface: #ffffff;
  --border: #ddd6cc;
  --border-light: #e8e3da;
  --text: #2a2520;
  --text-mid: #5c534a;
  --text-dim: #8a8078;
  --text-faint: #b5ada5;
  --besta: #1a5f3a;
  --besta-bg: #e8f3ed;
  --fyrsta: #6b4c9a;
  --fyrsta-bg: #f0ebf5;
  --annar: #2a6a8a;
  --annar-bg: #e6f0f5;
  --thridi: #7a6540;
  --thridi-bg: #f2ede4;
  --visited: #2d8a54;
  --visited-bg: #e0f5e8;
  --win: #2d8a54;
  --draw: #9a6b1a;
  --loss: #8a3a3a;
  --cup: #8a5e2a;
  --cup-bg: #fdf5e8;
  --overlay: rgba(30,26,22,0.45);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', Georgia, serif;
  min-height: 100vh;
}

/* ---- Header ---- */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1.5rem 1.5rem 1rem;
}

.header-inner {
  max-width: 900px;
  margin: 0 auto;
}

.header h1 {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: 1.6rem;
  letter-spacing: -0.03em;
}

.header h1 span {
  font-weight: 400;
  color: var(--text-dim);
  font-size: 0.9em;
}

.header-stats {
  display: flex;
  gap: 1.5rem;
  margin-top: 0.5rem;
  font-size: 0.85rem;
  color: var(--text-dim);
}

.header-stats strong {
  color: var(--text);
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
}

/* ---- Division sections ---- */
.main {
  max-width: 900px;
  margin: 0 auto;
  padding: 1.25rem 1.5rem 4rem;
}

.division {
  margin-bottom: 2rem;
}

.division-header {
  display: flex;
  align-items: baseline;
  gap: 0.6rem;
  margin-bottom: 0.75rem;
}

.division-name {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: 1.05rem;
  letter-spacing: -0.02em;
}

.division-progress {
  font-size: 0.78rem;
  color: var(--text-faint);
}

.division[data-div="besta"] .division-name { color: var(--besta); }
.division[data-div="fyrsta"] .division-name { color: var(--fyrsta); }
.division[data-div="annar"] .division-name { color: var(--annar); }
.division[data-div="thridi"] .division-name { color: var(--thridi); }

/* ---- Cards grid ---- */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 0.75rem;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
}

.card:hover {
  border-color: var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
}

.card-img {
  height: 72px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.division[data-div="besta"] .card-img { background: var(--besta-bg); }
.division[data-div="fyrsta"] .card-img { background: var(--fyrsta-bg); }
.division[data-div="annar"] .card-img { background: var(--annar-bg); }
.division[data-div="thridi"] .card-img { background: var(--thridi-bg); }

.card-img .icon { font-size: 1.6rem; opacity: 0.15; }

.card-img .cap-tag {
  position: absolute;
  bottom: 6px;
  right: 6px;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 0.62rem;
  font-weight: 600;
  color: var(--text-dim);
  background: rgba(255,255,255,0.85);
  padding: 2px 7px;
  border-radius: 5px;
}

.card-img .surface-tag {
  position: absolute;
  bottom: 6px;
  left: 6px;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 0.62rem;
  font-weight: 600;
  color: var(--text-dim);
  background: rgba(255,255,255,0.85);
  padding: 2px 7px;
  border-radius: 5px;
}

.card-body {
  padding: 0.7rem 0.85rem;
}

.card-ground {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: 0.92rem;
  letter-spacing: -0.02em;
}

.card-city {
  font-size: 0.78rem;
  color: var(--text-dim);
  margin-bottom: 0.3rem;
}

.card-team {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 600;
  font-size: 0.8rem;
  color: var(--text-mid);
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.card-visits {
  font-size: 0.7rem;
  color: var(--text-faint);
  margin-top: 0.2rem;
}

.card-visits strong {
  color: var(--visited);
  font-weight: 700;
}

/* Visited state */
.card.is-visited { border-color: #b0d9c0; }

.card .visit-indicator {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--visited);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 1;
}

.card.is-visited .visit-indicator { opacity: 1; }

.visit-indicator svg {
  width: 12px;
  height: 12px;
  stroke: white;
  stroke-width: 2.5;
  fill: none;
}

/* ======== Slide Panel ======== */
.slide-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--overlay);
  z-index: 299;
  opacity: 0;
  transition: opacity 0.25s ease;
}

.slide-backdrop.visible { display: block; opacity: 1; }

.slide-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 420px;
  max-width: 92vw;
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  box-shadow: -8px 0 30px rgba(0,0,0,0.12);
  z-index: 300;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.slide-panel.open { transform: translateX(0); }

.panel-top {
  padding: 1.25rem 1.25rem 0;
  flex-shrink: 0;
}

.panel-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 0.15rem;
}

.panel-ground {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: 1.2rem;
  letter-spacing: -0.02em;
}

.panel-city {
  font-size: 0.82rem;
  color: var(--text-dim);
}

.panel-team {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  color: var(--text-mid);
  margin-top: 0.3rem;
}

.panel-meta {
  display: flex;
  gap: 0.8rem;
  margin-top: 0.4rem;
  font-size: 0.72rem;
  color: var(--text-faint);
  font-family: 'Bricolage Grotesque', sans-serif;
}

.panel-close {
  background: var(--bg-warm);
  border: 1px solid var(--border);
  width: 30px;
  height: 30px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  color: var(--text-dim);
  flex-shrink: 0;
  transition: all 0.15s;
}

.panel-close:hover { background: var(--border); color: var(--text); }

/* ---- Year Navigator ---- */
.year-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin: 1rem 1.25rem 0.6rem;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid var(--border-light);
}

.year-nav .year-arrow {
  background: none;
  border: 1px solid var(--border);
  width: 32px;
  height: 32px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  transition: all 0.15s;
  font-size: 0.85rem;
}

.year-arrow:hover:not(:disabled) {
  background: var(--bg-warm);
  color: var(--text);
  border-color: var(--text-faint);
}

.year-arrow:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.year-label {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: 1.15rem;
  min-width: 80px;
  text-align: center;
  letter-spacing: -0.02em;
  user-select: none;
}

.year-fixtures-count {
  display: block;
  font-weight: 400;
  font-size: 0.65rem;
  color: var(--text-faint);
  margin-top: -1px;
}

/* ---- Fixture List ---- */
.fixtures-area {
  flex: 1;
  overflow-y: auto;
  padding: 0 1.25rem 1.5rem;
}

.fixture-section-label {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 600;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-faint);
  margin: 0.85rem 0 0.4rem;
}

.fixture-section-label.cup { color: var(--cup); }

.fixture-list { display: flex; flex-direction: column; gap: 4px; }

.fixture-row {
  display: grid;
  grid-template-columns: 38px 1fr auto;
  align-items: center;
  gap: 0.6rem;
  padding: 0.55rem 0.65rem;
  background: #f9f7f3;
  border: 1px solid var(--border-light);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}

.fixture-row:hover { background: var(--bg-warm); }

.fixture-row.attended {
  background: var(--visited-bg);
  border-color: #b0d9c0;
}

.fixture-row.is-cup {
  border-left: 3px solid var(--cup);
}

.fixture-row.upcoming {
  opacity: 0.5;
  cursor: default;
}

.fix-date {
  text-align: center;
  line-height: 1.1;
}

.fix-date .day {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: 1.05rem;
  display: block;
}

.fix-date .mon {
  font-size: 0.56rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-dim);
}

.fixture-row.attended .fix-date .day { color: var(--visited); }

.fix-detail .opponent {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 600;
  font-size: 0.82rem;
}

.fix-detail .meta {
  font-size: 0.68rem;
  color: var(--text-faint);
}

.fix-right {
  text-align: right;
}

.fix-score {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: 0.9rem;
}

.fix-score.w { color: var(--win); }
.fix-score.d { color: var(--draw); }
.fix-score.l { color: var(--loss); }

.fix-attended-check {
  display: none;
  font-size: 0.6rem;
  color: var(--visited);
  margin-top: 1px;
}

.fixture-row.attended .fix-attended-check { display: block; }

/* No fixtures state */
.no-fixtures {
  text-align: center;
  padding: 2.5rem 1rem;
  color: var(--text-faint);
  font-size: 0.9rem;
  font-style: italic;
}

/* ---- Responsive ---- */
@media (max-width: 640px) {
  .cards-grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 1.35rem; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>48 Klúbburinn <span>/ Grounds</span></h1>
    <div class="header-stats">
      <span><strong id="totalVisited">3</strong> of 48 grounds visited</span>
      <span><strong id="totalMatches">4</strong> matches attended</span>
    </div>
  </div>
</div>

<div class="main" id="main"></div>

<!-- Slide panel -->
<div class="slide-backdrop" id="backdrop" onclick="closePanel()"></div>
<div class="slide-panel" id="panel">
  <div class="panel-top">
    <div class="panel-header">
      <div>
        <div class="panel-ground" id="panelGround"></div>
        <div class="panel-city" id="panelCity"></div>
      </div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-team" id="panelTeam"></div>
    <div class="panel-meta" id="panelMeta"></div>
  </div>

  <div class="year-nav">
    <button class="year-arrow" id="yearPrev" onclick="changeYear(-1)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9,2 4,7 9,12"/></svg>
    </button>
    <div class="year-label" id="yearLabel">
      2025
      <span class="year-fixtures-count" id="yearCount"></span>
    </div>
    <button class="year-arrow" id="yearNext" onclick="changeYear(1)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="5,2 10,7 5,12"/></svg>
    </button>
  </div>

  <div class="fixtures-area" id="fixturesArea"></div>
</div>

<script>
// ---- Data ----
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MIN_YEAR = 2024;
const MAX_YEAR = 2026;

const divisions = [
  { key: 'besta', name: 'Besta deild', teams: [
    { team: 'KR', ground: 'KR-völlur', city: 'Reykjavík', cap: 2781, surface: 'Artificial', lat: 64.1396, lng: -21.8958 },
    { team: 'Valur', ground: 'Vodafonevöllurinn', city: 'Reykjavík', cap: 3060, surface: 'Artificial', lat: 64.1280, lng: -21.8806 },
    { team: 'Breiðablik', ground: 'Kópavogsvöllur', city: 'Kópavogur', cap: 3009, surface: 'Artificial', lat: 64.1050, lng: -21.8860 },
    { team: 'Víkingur R', ground: 'Víkingsvöllur', city: 'Reykjavík', cap: 3500, surface: 'Artificial', lat: 64.1275, lng: -21.8550 },
    { team: 'FH', ground: 'Kaplakriki', city: 'Hafnarfjörður', cap: 6450, surface: 'Artificial', lat: 64.0670, lng: -21.9710 },
    { team: 'Stjarnan', ground: 'Samsung völlurinn', city: 'Garðabær', cap: 1500, surface: 'Artificial', lat: 64.0887, lng: -21.9200 },
    { team: 'Fram', ground: 'Laugardalsvöllur', city: 'Reykjavík', cap: 9800, surface: 'Natural', lat: 64.1425, lng: -21.8756 },
    { team: 'ÍA', ground: 'Akureyrarvöllur', city: 'Akureyri', cap: 2550, surface: 'Artificial', lat: 65.6713, lng: -18.1016 },
    { team: 'Fylkir', ground: 'Fylkisvöllur', city: 'Reykjavík', cap: 2000, surface: 'Artificial', lat: 64.1154, lng: -21.8834 },
    { team: 'ÍBV', ground: 'Hasteinsvöllur', city: 'Vestmannaeyjar', cap: 3540, surface: 'Natural', lat: 63.4408, lng: -20.2700 },
    { team: 'Knattspyrnufélag Fjarðabyggðar', ground: 'Sindri-völlur', city: 'Fjarðabyggð', cap: 600, surface: 'Artificial', lat: 65.0316, lng: -13.8197 },
    { team: 'Keflavík', ground: 'Nettóvöllurinn', city: 'Keflavík', cap: 3000, surface: 'Artificial', lat: 64.0036, lng: -22.5553 },
  ]},
  { key: 'fyrsta', name: '1. deild', teams: [
    { team: 'Þróttur R', ground: 'Þróttarvöllurinn', city: 'Reykjavík', cap: 1200, surface: 'Artificial', lat: 64.1350, lng: -21.8950 },
    { team: 'HK', ground: 'Kópavogsvöllur', city: 'Kópavogur', cap: 3009, surface: 'Artificial', lat: 64.1050, lng: -21.8860 },
    { team: 'Leiknir R', ground: 'Leiknishæð', city: 'Reykjavík', cap: 500, surface: 'Artificial', lat: 64.1180, lng: -21.8130 },
    { team: 'Grindavík', ground: 'Grindavíkurvöllur', city: 'Grindavík', cap: 1500, surface: 'Artificial', lat: 63.8420, lng: -22.4340 },
    { team: 'UMF Selfoss', ground: 'Selfossvöllur', city: 'Selfoss', cap: 2000, surface: 'Natural', lat: 63.9346, lng: -21.0013 },
    { team: 'Throttur Vogar', ground: 'Vogavöllurinn', city: 'Vogar', cap: 500, surface: 'Artificial', lat: 63.9790, lng: -22.3830 },
    { team: 'KA', ground: 'Melavöllur', city: 'Akureyri', cap: 3200, surface: 'Artificial', lat: 65.6790, lng: -18.0920 },
    { team: 'Fjölnir', ground: 'Fjölnisvöllur', city: 'Reykjavík', cap: 1200, surface: 'Artificial', lat: 64.1115, lng: -21.8525 },
    { team: 'Tindastóll', ground: 'Tindastólsvöllur', city: 'Sauðárkrókur', cap: 1200, surface: 'Artificial', lat: 65.7490, lng: -19.6400 },
    { team: 'Magni', ground: 'Magnivöllur', city: 'Grenivík', cap: 300, surface: 'Natural', lat: 65.9610, lng: -18.1720 },
    { team: 'Afturelding', ground: 'Ásvöllur', city: 'Mosfellsbær', cap: 1000, surface: 'Artificial', lat: 64.1680, lng: -21.7030 },
    { team: 'Vestri', ground: 'Vestrivöllur', city: 'Ísafjörður', cap: 1200, surface: 'Artificial', lat: 66.0740, lng: -23.1240 },
  ]},
];

// Generate sample fixtures per team per year
function generateFixtures(team, ground, year) {
  const opponents = ['Valur','Breiðablik','FH','Stjarnan','KR','Fram','ÍA','Víkingur R','Fylkir','ÍBV','Keflavík'];
  const results = ['W','W','D','L','W','D','W','L','W','W','D'];
  const fixtures = [];
  const baseMonth = 3; // April (0-indexed)

  // League: 11 home matches
  for (let i = 0; i < 11; i++) {
    const m = baseMonth + Math.floor(i * 5.5 / 11);
    const d = 5 + Math.floor(Math.random() * 23);
    const opp = opponents.filter(o => o !== team.team);
    const opponent = opp[i % opp.length];
    const hg = Math.floor(Math.random() * 4);
    const ag = Math.floor(Math.random() * 3);
    const r = results[i % results.length];
    fixtures.push({
      id: `${team.team}-${year}-L${i+1}`,
      round: `R${i * 2 + 1}`,
      date: `${year}-${String(m + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,
      opponent,
      hg: r === 'W' ? Math.max(hg, ag + 1) : r === 'L' ? Math.min(hg, ag - 1 < 0 ? 0 : ag - 1) : hg,
      ag: r === 'W' ? Math.min(ag, hg - 1 < 0 ? 0 : hg - 1) : r === 'L' ? Math.max(ag, hg + 1) : hg,
      result: r,
      comp: 'league',
      time: ['14:00','16:00','18:00','20:00'][Math.floor(Math.random()*4)],
      ground: ground,
      played: year <= 2025,
    });
  }

  // Cup: 2-4 matches (random)
  const cupRounds = ['Round of 32','Round of 16','Quarter-final','Semi-final'];
  const numCup = 2 + Math.floor(Math.random() * 3);
  for (let i = 0; i < numCup; i++) {
    const m = 4 + i; // May onwards
    const d = 10 + Math.floor(Math.random() * 18);
    const cupOpp = opponents[Math.floor(Math.random() * opponents.length)];
    const r = i < numCup - 1 ? 'W' : ['W','L'][Math.floor(Math.random() * 2)];
    fixtures.push({
      id: `${team.team}-${year}-C${i+1}`,
      round: cupRounds[i],
      date: `${year}-${String(m + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,
      opponent: cupOpp,
      hg: r === 'W' ? 2 : 0,
      ag: r === 'W' ? 1 : 2,
      result: r,
      comp: 'cup',
      time: '19:00',
      ground: ground,
      played: year <= 2025,
    });
  }

  fixtures.sort((a, b) => a.date.localeCompare(b.date));
  return fixtures;
}

// State
const state = {
  attended: new Set(['KR-2025-L1','KR-2025-L5','KR-2025-C1','Víkingur R-2025-L3','FH-2024-L7']),
  currentTeam: null,
  currentYear: 2025,
};

function getVisitedGrounds() {
  const grounds = new Set();
  state.attended.forEach(id => {
    const team = id.split('-')[0];
    // find team in divisions
    for (const div of divisions) {
      const t = div.teams.find(t => t.team === team || id.startsWith(t.team + '-'));
      if (t) grounds.add(t.ground + '-' + t.team);
    }
  });
  return grounds;
}

function isTeamVisited(team) {
  for (const id of state.attended) {
    if (id.startsWith(team.team + '-')) return true;
  }
  return false;
}

function getTeamAttendedCount(team) {
  let count = 0;
  for (const id of state.attended) {
    if (id.startsWith(team.team + '-')) count++;
  }
  return count;
}

// ---- Render cards ----
function renderCards() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  let totalVisited = 0;

  divisions.forEach(div => {
    const section = document.createElement('div');
    section.className = 'division';
    section.dataset.div = div.key;

    const visitedInDiv = div.teams.filter(t => isTeamVisited(t)).length;
    totalVisited += visitedInDiv;

    section.innerHTML = `
      <div class="division-header">
        <div class="division-name">${div.name}</div>
        <div class="division-progress">${visitedInDiv} / ${div.teams.length}</div>
      </div>
      <div class="cards-grid">
        ${div.teams.map(t => cardHTML(t, div.key)).join('')}
      </div>
    `;
    main.appendChild(section);
  });

  document.getElementById('totalVisited').textContent = totalVisited;
  document.getElementById('totalMatches').textContent = state.attended.size;
}

function cardHTML(team, divKey) {
  const visited = isTeamVisited(team);
  const count = getTeamAttendedCount(team);
  return `
    <div class="card ${visited ? 'is-visited' : ''}" onclick="openPanel('${team.team}', '${divKey}')">
      <div class="visit-indicator">
        <svg viewBox="0 0 14 14" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,7 6,10 11,4"/></svg>
      </div>
      <div class="card-img">
        <span class="icon">⬡</span>
        <span class="cap-tag">${team.cap.toLocaleString()}</span>
        <span class="surface-tag">${team.surface}</span>
      </div>
      <div class="card-body">
        <div class="card-ground">${team.ground}</div>
        <div class="card-city">${team.city}</div>
        <div class="card-team">${team.team}</div>
        ${count > 0 ? `<div class="card-visits"><strong>${count}</strong> match${count !== 1 ? 'es' : ''} attended</div>` : ''}
      </div>
    </div>`;
}

// ---- Panel ----
function openPanel(teamName, divKey) {
  const div = divisions.find(d => d.key === divKey);
  const team = div.teams.find(t => t.team === teamName);
  if (!team) return;

  state.currentTeam = { ...team, divName: div.name, divKey };
  state.currentYear = 2025;

  document.getElementById('panelGround').textContent = team.ground;
  document.getElementById('panelCity').textContent = team.city;
  document.getElementById('panelTeam').textContent = `${team.team} · ${div.name}`;
  document.getElementById('panelMeta').innerHTML = `
    <span>Cap. ${team.cap.toLocaleString()}</span>
    <span>${team.surface}</span>
    <span>${team.city}</span>
  `;

  renderFixtures();
  document.getElementById('panel').classList.add('open');
  document.getElementById('backdrop').classList.add('visible');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('backdrop').classList.remove('visible');
}

function changeYear(delta) {
  const newYear = state.currentYear + delta;
  if (newYear < MIN_YEAR || newYear > MAX_YEAR) return;
  state.currentYear = newYear;
  renderFixtures();
}

function renderFixtures() {
  const team = state.currentTeam;
  if (!team) return;

  const year = state.currentYear;

  // Update year nav
  document.getElementById('yearLabel').innerHTML = `
    ${year}
    <span class="year-fixtures-count" id="yearCount"></span>
  `;
  document.getElementById('yearPrev').disabled = year <= MIN_YEAR;
  document.getElementById('yearNext').disabled = year >= MAX_YEAR;

  // Generate fixtures
  const fixtures = generateFixtures(team, team.ground, year);
  const league = fixtures.filter(f => f.comp === 'league');
  const cup = fixtures.filter(f => f.comp === 'cup');

  const total = fixtures.length;
  const attendedCount = fixtures.filter(f => state.attended.has(f.id)).length;
  document.getElementById('yearCount').textContent = `${attendedCount} / ${total} attended`;

  const area = document.getElementById('fixturesArea');

  if (fixtures.length === 0) {
    area.innerHTML = '<div class="no-fixtures">No fixtures for this season</div>';
    return;
  }

  let html = '';

  if (league.length > 0) {
    html += `<div class="fixture-section-label">League · ${league.length} home matches</div>`;
    html += '<div class="fixture-list">' + league.map(f => fixtureRowHTML(f)).join('') + '</div>';
  }

  if (cup.length > 0) {
    html += `<div class="fixture-section-label cup">Borgunarbikarinn · ${cup.length} matches</div>`;
    html += '<div class="fixture-list">' + cup.map(f => fixtureRowHTML(f)).join('') + '</div>';
  }

  area.innerHTML = html;
}

function fixtureRowHTML(fix) {
  const d = new Date(fix.date + 'T12:00:00');
  const attended = state.attended.has(fix.id);
  const cls = fix.result === 'W' ? 'w' : fix.result === 'L' ? 'l' : 'd';
  const isCup = fix.comp === 'cup';

  return `
    <div class="fixture-row ${attended ? 'attended' : ''} ${isCup ? 'is-cup' : ''} ${!fix.played ? 'upcoming' : ''}"
         onclick="${fix.played ? `toggleAttended('${fix.id}')` : ''}">
      <div class="fix-date">
        <span class="day">${d.getDate()}</span>
        <span class="mon">${MONTHS[d.getMonth()]}</span>
      </div>
      <div class="fix-detail">
        <div class="opponent">v ${fix.opponent}</div>
        <div class="meta">${fix.round} · ${fix.time} · ${fix.ground}</div>
      </div>
      <div class="fix-right">
        ${fix.played
          ? `<div class="fix-score ${cls}">${fix.hg} – ${fix.ag}</div>`
          : `<div class="fix-score" style="color:var(--text-faint); font-size:0.7rem;">upcoming</div>`
        }
        <div class="fix-attended-check">✓ attended</div>
      </div>
    </div>`;
}

function toggleAttended(id) {
  if (state.attended.has(id)) {
    state.attended.delete(id);
  } else {
    state.attended.add(id);
  }
  renderFixtures();
  renderCards();
}

// ---- Init ----
renderCards();

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
  if (e.key === 'ArrowLeft' && document.getElementById('panel').classList.contains('open')) changeYear(-1);
  if (e.key === 'ArrowRight' && document.getElementById('panel').classList.contains('open')) changeYear(1);
});
</script>
</body>
</html>
